databaseChangeLog:
  - changeSet:
      id: 501-seed-roles
      author: nemanja
      changes:
        - insert:
            tableName: role
            columns:
              - column:
                  name: name
                  value: "SUPER_ADMIN"
              - column:
                  name: description
                  value: "Full access (all locations)"
        - insert:
            tableName: role
            columns:
              - column:
                  name: name
                  value: "LOCAL_ADMIN"
              - column:
                  name: description
                  value: "Access scoped to assigned locations"

