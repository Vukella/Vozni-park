  # --- 611: Link DRIVER records to ZAPOSLENI by SAP_NUMBER ---
  - changeSet:
      id: 611-link-driver-to-zaposleni
      author: nemanja
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: driver
        - tableExists:
            tableName: zaposleni
        - columnExists:
            tableName: driver
            columnName: ZAPOSLENI_ID
      changes:
        - sql:
            sql: |
              UPDATE driver d
              JOIN zaposleni z ON d.sap_number = z.SAP_NUMBER
              SET d.ZAPOSLENI_ID = z.ID_ZAPOSLENI
              WHERE d.ZAPOSLENI_ID IS NULL;
  # --- 612: Create OTP_CODES table ---
  - changeSet:
      id: 612-create-otp-codes-table
      author: nemanja
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: otp_codes
      changes:
        - createTable:
            tableName: otp_codes
            columns:
              - column:
                  name: ID_OTP
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: EMAIL
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: CODE
                  type: CHAR(6)
                  constraints:
                    nullable: false
              - column:
                  name: EXPIRES_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: USED
                  type: TINYINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

