# Application Name
spring.application.name=vozni-park

# Server Configuration
server.port=8080

# MySQL Database Configuration (PORT 3307, NO PASSWORD)
spring.datasource.url=jdbc:mysql://localhost:3307/vozni_park_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Belgrade
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.drop-first=false

# AGGRESSIVE Liquibase Logging
logging.level.liquibase=TRACE
logging.level.liquibase.changelog=TRACE
logging.level.liquibase.database=TRACE
logging.level.liquibase.executor=TRACE
logging.level.liquibase.lockservice=TRACE
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.example.vozni_park.controller
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# DevTools
spring.devtools.restart.enabled=true

# Application Logging
logging.level.com.example.vozni_park=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG