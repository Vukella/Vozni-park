# Application Name
spring.application.name=vozni-park

# Server Configuration
server.port=8080

# MySQL Database Configuration
# When running locally with XAMPP: no env vars needed, falls back to defaults
# When running in Docker: DB_HOST=mysql, DB_PORT=3306 injected via docker-compose
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:vozni_park_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Belgrade&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# XAMPP
#spring.datasource.url=jdbc:mysql://localhost:3306/vozni_park_db
#spring.datasource.username=root
#spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.drop-first=false

# Liquibase Logging
logging.level.liquibase=TRACE
logging.level.liquibase.changelog=TRACE
logging.level.liquibase.database=TRACE
logging.level.liquibase.executor=TRACE
logging.level.liquibase.lockservice=TRACE
logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.example.vozni_park.controller
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# DevTools (only active in local dev, ignored in Docker prod build)
spring.devtools.restart.enabled=true

 # Application Logging
 logging.level.com.example.vozni_park=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
# In Docker: JWT_SECRET is injected from .env via docker-compose
# Locally: falls back to the hardcoded dev secret below
jwt.secret=${JWT_SECRET:VozniParkSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256AlgorithmSecurityPurposes2025}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Mail Configuration (Mailtrap)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 2FA OTP Configuration
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}