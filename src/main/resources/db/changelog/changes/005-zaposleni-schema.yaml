            tableName: otp_codes
            indexName: idx_otp_codes_email
            columns:
              - column:
                  name: EMAIL
        - createIndex:
            tableName: otp_codes
            indexName: idx_otp_codes_expires_at
            columns:
              - column:
                  name: EXPIRES_AT
        - createIndex:
            tableName: otp_codes
            indexName: idx_otp_codes_used
            columns:
              - column:
                  name: USED