name: Backend CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test

  code-quality:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test

    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        env:
          SONAR_FORCEAUTHENTICATION: "false"
        options: >-
          --health-cmd "wget -qO- http://localhost:9000/api/system/status | grep -q UP"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 90s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to start..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:9000/api/system/status \
              | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is UP!"
              break
            fi
            sleep 10
          done

      - name: Run tests with coverage
        run: mvn verify

      - name: SonarQube analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=vozni-park-backend \
            -Dsonar.projectName="Vozni Park Backend" \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=admin \
            -Dsonar.password=admin \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vozni-park-backend:latest