            constraintName: fk_dla_drivers_license

  - changeSet:
      id: 312-fk-travel-order-location-unit
      author: nemanja
      changes:
        - addForeignKeyConstraint:
            baseTableName: travel_order
            baseColumnNames: location_id
            referencedTableName: location_unit
            referencedColumnNames: id_location_unit
            constraintName: fk_travel_order_location_unit

  - changeSet:
      id: 313-fk-travel-order-counter-location-unit
      author: nemanja
      changes:
        - addForeignKeyConstraint:
            baseTableName: travel_order_counter
            baseColumnNames: location_id
            referencedTableName: location_unit
            referencedColumnNames: id_location_unit
            constraintName: fk_travel_order_counter_location_unit

  - changeSet:
      id: 314-fk-travel-order-created-by-user
      author: nemanja
      changes:
        - addForeignKeyConstraint:
            baseTableName: travel_order
            baseColumnNames: created_by_user_id
            referencedTableName: app_user
            referencedColumnNames: id_user
            constraintName: fk_travel_order_created_by_user

  - changeSet:
      id: 315-fk-driver-travel-order-driver
